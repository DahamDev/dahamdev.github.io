<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    {{ $style := resources.Get "css/styles.css" | fingerprint }}
    <link rel="stylesheet" href="{{ $style.RelPermalink }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="{{ if .Section }}section-{{ .Section }} {{ end }}kind-{{ .Kind }}">
    <div class="site-orbit" aria-hidden="true">
        <span></span><span></span><span></span>
    </div>
    <div class="scroll-progress" aria-hidden="true"></div>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="container">
            <a href="/" class="nav-brand">{{ .Site.Params.name }}</a>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span></span><span></span>
            </button>
            <div class="nav-right">
                <ul class="nav-menu">
                    {{ range .Site.Menus.main }}
                    <li><a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a></li>
                    {{ end }}
                </ul>
                <div class="nav-social">
                    <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener" aria-label="GitHub"><i class="fab fa-github"></i></a>
                    <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>
        </div>
    </nav>

    <main>{{ block "main" . }}{{ end }}</main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>&copy; {{ now.Year }} {{ .Site.Params.name }}</p>
                <div class="footer-links">
                    <a href="mailto:{{ .Site.Params.email }}">Email</a>
                    <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener">GitHub</a>
                    <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.querySelector('.nav-toggle').addEventListener('click', function() {
            const expanded = this.getAttribute('aria-expanded') === 'true';
            this.setAttribute('aria-expanded', !expanded);
            document.querySelector('.nav-right').classList.toggle('active');
            this.classList.toggle('active');
        });
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.08 });
        document.querySelectorAll('.animate-in').forEach(el => obs.observe(el));

        const root = document.documentElement;
        window.addEventListener('pointermove', (event) => {
            root.style.setProperty('--pointer-x', `${event.clientX}px`);
            root.style.setProperty('--pointer-y', `${event.clientY}px`);
        }, { passive: true });

        const progress = document.querySelector('.scroll-progress');
        const updateProgress = () => {
            const max = document.documentElement.scrollHeight - window.innerHeight;
            const ratio = max > 0 ? window.scrollY / max : 0;
            progress.style.transform = `scaleX(${ratio})`;
        };
        updateProgress();
        window.addEventListener('scroll', updateProgress, { passive: true });
    </script>
</body>
</html>
